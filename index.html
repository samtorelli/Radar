<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Radar - Better CSI</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f5f0ea;min-height:100vh}
nav{position:sticky;top:0;z-index:50;background:rgba(255,247,251,.92);backdrop-filter:blur(20px);display:flex;justify-content:space-between;align-items:center;padding:14px 22px;border-bottom:1px solid rgba(211,193,213,.4)}
.nav-logo{display:flex;align-items:center;gap:10px}
.nav-logo-icon{width:38px;height:38px;border-radius:10px;background:#8a05be;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 14px rgba(138,5,190,.35)}
.nav-title{font-weight:900;color:#8a05be;font-size:16px;letter-spacing:-.02em}
.nav-step{font-size:11px;font-weight:700;color:#4f4253;background:#ecdeec;border-radius:999px;padding:4px 12px}
main{padding:28px 20px 90px;max-width:580px;margin:0 auto}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(22px)}to{opacity:1;transform:translateX(0)}}
@keyframes pop{0%{transform:scale(.8);opacity:0}70%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
@keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
.fade-up{animation:slideIn .32s ease both}
.progress-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:#8a05be;display:block;margin-bottom:10px}
.progress-bar{display:flex;gap:5px;height:5px;margin-bottom:24px}
.progress-bar span{flex:1;border-radius:999px;transition:all .4s ease}
h1{font-size:clamp(22px,5vw,32px);font-weight:900;color:#201923;letter-spacing:-.03em;line-height:1.15;margin-bottom:10px}
.subtitle{color:#4f4253;font-size:13px;line-height:1.6;margin-bottom:20px}
.card{background:#f8eaf7;border-radius:14px;padding:20px 22px;margin-bottom:16px}
.card-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:#8a05be;display:block;margin-bottom:10px}
.card h2{font-weight:700;color:#201923;font-size:15px;margin-bottom:8px}
.card p{color:#4f4253;font-size:12px;line-height:1.6;margin-bottom:12px}
.btn-primary{background:#8a05be;color:#fff;border:none;border-radius:10px;padding:13px 26px;font-weight:800;font-size:14px;cursor:pointer;font-family:inherit;box-shadow:0 8px 24px rgba(138,5,190,.22);display:inline-flex;align-items:center;gap:8px;transition:all .15s}
.btn-primary:hover{background:#670090}
.btn-primary:active{transform:scale(.97)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;box-shadow:none}
.btn-secondary{background:transparent;color:#670090;border:2px solid #d3c1d5;border-radius:10px;padding:13px 26px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-secondary:hover{border-color:#8a05be;color:#8a05be}
.btn-full{width:100%;justify-content:center;padding:15px}
.btn-row{display:flex;justify-content:flex-end;gap:10px;margin-top:8px}
.btn-row-between{display:flex;justify-content:space-between;gap:10px}
.stars{display:flex;gap:2px;margin-bottom:6px}
.star-btn{background:none;border:none;cursor:pointer;font-size:28px;line-height:1;padding:2px 1px;transition:all .15s ease;color:#d3c1d5}
.star-btn.lit{color:#8a05be}
.star-label{font-size:11px;color:#4f4253;font-weight:600;opacity:.8;min-height:18px}
.radio-card{width:100%;background:#f8eaf7;border:2px solid transparent;border-radius:14px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:all .18s ease;margin-bottom:8px;text-align:left;font-family:inherit}
.radio-card:hover{border-color:#eab2ff}
.radio-card.sel{background:#f7d8ff;border-color:#8a05be}
.radio-card-label{font-weight:600;color:#201923;font-size:14px}
.radio-dot{width:20px;height:20px;border-radius:50%;background:rgba(211,193,213,.4);display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;transition:all .18s;flex-shrink:0}
.radio-card.sel .radio-dot{background:#8a05be}
.tags{display:flex;flex-wrap:wrap;margin-bottom:28px}
.tag-btn{background:#ecdeec;border:2px solid transparent;border-radius:999px;padding:8px 14px;font-weight:700;font-size:12px;cursor:pointer;color:#4f4253;transition:all .18s ease;margin:4px;font-family:inherit;display:inline-flex;align-items:center;gap:5px}
.tag-btn:hover{border-color:#eab2ff}
.tag-btn.sel{background:#f7d8ff;border-color:#8a05be;color:#670090;transform:scale(1.05)}
.input-wrap{background:#ecdeec;border-radius:10px;padding:4px}
textarea,input[type=text],input[type=email],input[type=tel]{width:100%;background:transparent;border:none;resize:vertical;padding:12px 14px;color:#201923;font-size:13px;font-family:inherit;line-height:1.6;outline:none}
.toggle-wrap{display:flex;align-items:center;gap:10px;background:none;border:none;cursor:pointer;font-family:inherit;margin-bottom:16px;padding:0}
.toggle-track{width:44px;height:24px;border-radius:999px;background:#d3c1d5;transition:background .2s;position:relative;flex-shrink:0}
.toggle-track.on{background:#8a05be}
.toggle-thumb{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.toggle-track.on .toggle-thumb{left:23px}
.toggle-label{font-size:13px;font-weight:600;color:#4f4253}
.nps-grid{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.nps-btn{width:40px;height:40px;border-radius:10px;border:none;cursor:pointer;font-weight:800;font-size:13px;font-family:inherit;background:#ecdeec;color:#4f4253;transition:all .15s ease}
.nps-btn.sel{background:#8a05be;color:#fff;transform:scale(1.15);box-shadow:0 4px 12px rgba(138,5,190,.25)}
.nps-extremes{display:flex;justify-content:space-between;margin-top:4px}
.nps-extremes span{font-size:10px;color:#4f4253;opacity:.5;font-weight:600}
.nps-result{margin-top:12px;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:700;animation:fadeUp .2s ease}
.sending-bar{height:3px;background:linear-gradient(90deg,#8a05be,#f7d8ff,#8a05be);background-size:200%;border-radius:2px;margin-bottom:16px;animation:shimmer 1.2s linear infinite}
.done-icon{width:88px;height:88px;border-radius:24px;background:#8a05be;display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto 22px;box-shadow:0 16px 50px rgba(138,5,190,.35);animation:pop .5s .1s ease both}
.done-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.chip{background:#f7d8ff;color:#670090;border-radius:999px;padding:5px 12px;font-size:11px;font-weight:700;display:inline-block;margin:3px}
.chip-gray{background:#ecdeec;color:#4f4253}
.hint-box{background:linear-gradient(135deg,#f7d8ff,#feeffd);border-radius:14px;padding:18px 20px;margin-bottom:24px;border:1px solid rgba(234,178,255,.6);display:flex;align-items:flex-start;gap:12px}
.footer-note{text-align:center;border-top:1px solid rgba(211,193,213,.3);padding-top:24px;margin-top:36px;font-size:11px;color:#4f4253;opacity:.4;font-style:italic}
#confetti{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:9999}
</style>

function confetti(){
  var c=document.getElementById("confetti");c.innerHTML="";
  var cols=["#f7d8ff","#8a05be","#eab2ff","#670090","#fff","#ffb2f5"];
  for(var i=0;i<40;i++){
    var d=document.createElement("div");
    var x=Math.random()*100,delay=Math.random()*1.4,dur=1.6+Math.random()*1.2,size=7+Math.random()*7;

function progress(cur,tot){
  var pct=Math.round((cur/tot)*100);
  var bars="";
  for(var i=0;i<tot;i++) bars+='<span style="background:'+(i<cur?"#8a05be":"#d3c1d5")+';opacity:'+(i<cur?1:.25)+'"></span>';
  return '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span class="progress-label" style="margin-bottom:0">passo '+cur+' de '+tot+'</span><span style="font-size:11px;font-weight:800;color:#8a05be">'+pct+'% concluído</span></div><div class="progress-bar">'+bars+'</div>';
}

}

function render(stepChanged){

function renderStep1(){
  var dispHtml=DISP.map(function(o){
    return '<button class="radio-card'+(S.disponibilidade===o.v?" sel":"")+'" onclick="setState({disponibilidade:\''+o.v+'\'})">'+
      '<span class="radio-card-label">'+o.e+" "+o.l+'</span>'+
      '<div class="radio-dot">'+(S.disponibilidade===o.v?"✓":"")+'</div></button>';
  }).join("");

  var starsHtml='<div class="stars">';
  for(var s=1;s<=5;s++) starsHtml+='<button class="star-btn'+(s<=S.estrelas?" lit":"")+'" onclick="S.estrelas='+s+';render()" onmouseover="hoverS('+s+')" onmouseout="hoverS(0)">★</button>';
  starsHtml+='</div><div class="star-label" id="slbl">'+(S.estrelas>0?STAR_LABELS[S.estrelas]:"")+'</div>';

  var canNext=S.estrelas>0&&S.disponibilidade!=="";
  return progress(1,3)+
    '<h1>como tá sendo ter o sam como seu better?</h1>'+
    '<p class="subtitle">seja sincero(a) — o feedback honesto é o que mais ajuda ele a evoluir 💜</p>'+
    '<div style="margin-bottom:16px"><h2 style="font-weight:700;color:#201923;font-size:15px;margin-bottom:12px">sobre qual dia você está avaliando?</h2>'+
    ['dia 1','dia 2','dia 3'].map(function(d){
      return '<button class="radio-card'+(S.dia===d?" sel":"")+'" onclick="setState({dia:\''+d+'\'})">'+
        '<span class="radio-card-label">'+d+'</span>'+
        '<div class="radio-dot">'+(S.dia===d?"✓":"")+'</div></button>';
    }).join("")+'</div>'+
    '<div class="card"><h2>nota geral pra experiência com ele</h2><p style="color:#4f4253;font-size:12px;margin-bottom:14px">1 estrela = sofrível · 5 estrelas = incrível</p>'+starsHtml+'</div>'+
    '<div style="margin-bottom:16px"><h2 style="font-weight:700;color:#201923;font-size:15px;margin-bottom:12px">ele está disponível quando você precisa?</h2>'+dispHtml+'</div>'+
    '<div class="card"><h2>primeira impressão em poucas palavras</h2><p>o que veio na cabeça primeiro quando você pensa no sam como better?</p>'+
    '<div class="input-wrap"><textarea rows="3" placeholder="pode falar à vontade... 💬" oninput="S.impressao=this.value">'+esc(S.impressao)+'</textarea></div></div>'+
    '<div class="btn-row">'+
      '<button class="btn-secondary" onclick="setState({step:0})">← voltar</button>'+
      '<button class="btn-primary" onclick="canGoStep2()" '+(S.estrelas>0&&S.disponibilidade&&S.dia?"":"disabled")+'>próximo →</button>'+
    '</div>';
}

function hoverS(n){
  var btns=document.querySelectorAll(".star-btn");
  btns.forEach(function(b,i){
    b.style.color=(i<(n||S.estrelas))?"#8a05be":"#d3c1d5";
    b.style.transform=(i===n-1)?"scale(1.3)":"scale(1)";
  });
  var lbl=document.getElementById("slbl");
  if(lbl)lbl.textContent=n>0?STAR_LABELS[n]:(S.estrelas>0?STAR_LABELS[S.estrelas]:"");
}
function canGoStep2(){if(S.estrelas>0&&S.disponibilidade&&S.dia)setState({step:2});}

function renderStep2(){
  var fortesHtml=FORTES.map(function(f){
    var sel=S.fortes.indexOf(f)>=0;
    return '<button class="tag-btn'+(sel?" sel":"")+'" onclick="toggleF(\''+escA(f)+'\')">'+
      (sel?'<span style="font-size:9px">✓</span>':"")+esc(f)+'</button>';
  }).join("");

  var npsHtml=Array.from({length:11},function(_,i){
    return '<button class="nps-btn'+(S.nps===i?" sel":"")+'" onclick="setState({nps:'+i+'})">'+i+'</button>';
  }).join("");

  var npsResult="";
  if(S.nps!==null){
    var nbg=S.nps>=9?"#e8f8ef":S.nps>=7?"#fff8e1":"#f7d8ff";
    var nc=S.nps>=9?"#1a7a4a":S.nps>=7?"#a06000":"#670090";
    npsResult='<div class="nps-result" style="background:'+nbg+';color:'+nc+'">você é um(a) <strong>'+npsLabel()+'</strong> do sam 💜</div>';
  }

  return progress(2,3)+
    '<h1>no que o sam arrasa? 🌟</h1>'+
    '<p class="subtitle">seleciona tudo que bate com a experiência que você teve com ele.</p>'+
    '<div class="tags">'+fortesHtml+'</div>'+
    '<div class="card"><h2>de 0 a 10: o quanto você indicaria o sam como better pra outros nuvinhos?</h2>'+
    '<div class="nps-grid">'+npsHtml+'</div>'+
    '<div class="nps-extremes"><span>nem um pouco</span><span>com certeza!</span></div>'+npsResult+'</div>'+
    '<div class="card"><h2>deixa um recado direto pro sam 💌</h2><p>pode ser elogio, pedido, sugestão... ele vai ler pessoalmente.</p>'+
    '<div class="input-wrap"><textarea rows="3" placeholder="ei sam, queria te dizer que..." oninput="S.recado=this.value">'+esc(S.recado)+'</textarea></div></div>'+
    '<div class="btn-row-between">'+
      '<button class="btn-secondary" onclick="setState({step:1})">← voltar</button>'+
      '<button class="btn-primary" onclick="setState({step:3})">próximo →</button>'+
    '</div>';
}

function toggleF(f){var a=S.fortes.indexOf(f)>=0?S.fortes.filter(function(x){return x!==f;}):[...S.fortes,f];setState({fortes:a});}

function renderStep3(){
  var expHtml=EXPECTATIVAS.map(function(e){
    var sel=S.expectativas.indexOf(e)>=0;
    return '<button class="tag-btn'+(sel?" sel":"")+'" onclick="toggleE(\''+escA(e)+'\')">'+
      (sel?'<span style="font-size:9px">✓</span>':"")+esc(e)+'</button>';
  }).join("");

  var btnBg=S.expectativas.length>0?"#8a05be":"#d3c1d5";
  var btnShadow=S.expectativas.length>0?"0 8px 24px rgba(138,5,190,.22)":"none";

  return progress(3,3)+
    '<h1>o que poderia ter sido melhor nesses 3 dias?</h1>'+
    '<p class="subtitle">seleciona o que sentiu falta ou poderia ter tido mais espaço durante o acompanhamento.</p>'+
    '<div class="tags">'+expHtml+'</div>'+
    '<div class="card"><h2>o quanto você se sentiu à vontade pra ser honesto(a)?</h2>'+
    '<p style="color:#4f4253;font-size:12px;margin-bottom:14px">0 = travei um pouco · 10 = falei tudo que queria</p>'+
    '<div class="nps-grid">'+Array.from({length:11},function(_,i){return '<button class="nps-btn'+(S.confianca===i?" sel":"")+'" onclick="setState({confianca:'+i+'})">'+i+'</button>';}).join("")+'</div>'+
    '<div class="nps-extremes"><span>não me senti confortável</span><span>100% à vontade</span></div></div>'+
    '<div class="card"><h2>algo mais que queira compartilhar? <span style="font-weight:500;font-size:12px;color:#8a05be">(opcional)</span></h2>'+
    '<div class="input-wrap"><textarea rows="3" placeholder="espaço livre pra qualquer coisa que você queira falar... 💬" oninput="S.textolivre=this.value">'+esc(S.textolivre)+'</textarea></div></div>'+
    '<div class="hint-box"><span style="font-size:22px;flex-shrink:0">💡</span>'+
      '<div><p style="font-weight:700;font-size:13px;color:#201923;margin-bottom:4px">sua voz importa de verdade</p>'+
      '<small style="font-size:12px;color:#4f4253;line-height:1.6">o sam usa esse radar pra se desenvolver como better. cada resposta vira ação real.</small></div></div>'+
    (S.sending?'<div class="sending-bar"></div>':"")+
    '<div class="btn-row-between">'+
      '<button class="btn-secondary" onclick="setState({step:2})">← voltar</button>'+
      '<button class="btn-primary" style="background:'+btnBg+';box-shadow:'+btnShadow+'" onclick="submitForm()" '+(S.sending?"disabled":"")+'>'+
        (S.sending?"enviando...":"enviar feedback 💜")+'</button>'+
    '</div>';
}

function toggleE(e){var a=S.expectativas.indexOf(e)>=0?S.expectativas.filter(function(x){return x!==e;}):[...S.expectativas,e];setState({expectativas:a});}

async function submitForm(){
  setState({sending:true});
  var n=bumpCount();
  var payload={
    timestamp:new Date().toLocaleString("pt-BR"),
    protocolo:S.proto,
    dia:S.dia,
    nome:S.anonimo?"anônimo(a)":(S.nome||"não informado"),
    email:S.anonimo?"anonimo@radar-csi.nubank":(S.email||"anonimo@radar-csi.nubank"),
    estrelas:S.estrelas,
    disponibilidade:S.disponibilidade,
    impressao:S.impressao,
    fortes:S.fortes.join(", "),
    nps:S.nps!==null?S.nps:"",
    recado:S.recado,
    confianca:S.confianca!==null?S.confianca:"",
    expectativas:S.expectativas.join(", "),
    textolivre:S.textolivre
  };
  try{
    var response=await fetch("https://formspree.io/f/maqlonjg",{
      method:"POST",
      headers:{"Accept":"application/json","Content-Type":"application/json"},
      body:JSON.stringify(payload)
    });
    if(!response.ok){
      var errData={};
      try{errData=await response.json();}catch(e){}
      console.error("Formspree error:",response.status,errData);
      setState({sending:false});
      var msg=errData.error||("erro "+response.status+": tente novamente em instantes.");
      alert("⚠️ Não foi possível enviar o feedback.\n"+msg);
      return;
    }
    setState({sending:false,step:"done",countResult:n});
    confetti();
  }
  catch(err){
    console.error("Formspree fetch falhou:",err);
    setState({sending:false});
    alert("⚠️ Não foi possível enviar o feedback.\nVerifique sua conexão e tente novamente.");
  }
}

function renderDone(){
  var nome=S.anonimo?"":(S.nome||"nuvinho(a)");
  var fortesChips=S.fortes.map(function(f){return'<span class="chip">'+esc(f)+'</span>';}).join("");
  var expChips=S.expectativas.map(function(e){return'<span class="chip chip-gray">'+esc(e)+'</span>';}).join("");
  var npsBg=S.nps>=9?"#1a7a4a":S.nps>=7?"#a06000":"#670090";
  var starsHtml=[1,2,3,4,5].map(function(s){return'<span style="font-size:22px;color:'+(s<=S.estrelas?"#8a05be":"#d3c1d5")+'">★</span>';}).join("");

  return '<div style="text-align:center;padding-top:10px">'+
    '<div class="done-icon">🎉</div>'+
    '<h1 style="text-align:center;font-size:clamp(28px,6vw,40px)">'+(S.anonimo?"feedback enviado!":"obrigado, "+esc(nome)+"!")+'</h1>'+
    '<p class="subtitle" style="text-align:center;max-width:380px;margin:10px auto 14px;font-size:14px">o sam vai receber seu radar e usar isso pra se tornar um better ainda melhor. você faz parte desse crescimento. 💜</p>'+
    (S.countResult>0?'<div style="background:#f7d8ff;border-radius:999px;padding:6px 18px;display:inline-block;font-size:12px;font-weight:700;color:#670090;margin-bottom:10px">🎯 você é o nuvinho #'+S.countResult+' a responder neste dispositivo</div><br>':'')+
    (S.nps>=9?'<div style="background:#e8f8ef;border-radius:10px;padding:10px 16px;display:inline-block;font-size:12px;font-weight:600;color:#1a7a4a;margin-bottom:20px">🚀 você é um(a) promotor(a) — o sam agradece de verdade!</div>':
     S.nps>=7?'<div style="background:#fff8e1;border-radius:10px;padding:10px 16px;display:inline-block;font-size:12px;font-weight:600;color:#a06000;margin-bottom:20px">😐 nota neutra — o que faltaria pra chegar no 10?</div>':
     S.nps!==null?'<div style="background:#f7d8ff;border-radius:10px;padding:10px 16px;display:inline-block;font-size:12px;font-weight:600;color:#670090;margin-bottom:20px">💜 feedback crítico é o mais valioso — obrigado pela honestidade.</div>':'')+
  '</div>'+
  '<div class="done-grid">'+
    '<div class="card" style="margin:0"><span class="card-label">nota geral</span><div>'+starsHtml+'</div></div>'+
    '<div style="background:'+npsBg+';border-radius:14px;padding:18px 20px;position:relative;overflow:hidden;margin:0">'+
      '<span style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.7);display:block;margin-bottom:6px">nps do better</span>'+
      '<span style="font-size:36px;font-weight:900;color:#fff">'+(S.nps!==null?S.nps:"-")+'</span>'+
      '<span style="display:block;font-size:11px;color:rgba(255,255,255,.8);font-weight:600;margin-top:2px">'+npsLabel()+'</span>'+
      '<div style="position:absolute;bottom:-16px;right:-16px;width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.08)"></div>'+
    '</div>'+
  '</div>'+
  '<div class="card" style="display:flex;align-items:center;gap:10px;margin-top:12px">'+
    '<span class="card-label" style="margin-bottom:0;flex-shrink:0">dia avaliado</span>'+
    '<span style="font-weight:600;font-size:13px;color:#201923">'+esc(S.dia)+'</span>'+
  '</div>'+
  '<div class="card" style="display:flex;align-items:center;gap:10px;margin-top:12px">'+
    '<span class="card-label" style="margin-bottom:0;flex-shrink:0">disponibilidade</span>'+
    '<span style="font-weight:600;font-size:13px;color:#201923">'+esc(S.disponibilidade)+'</span>'+
  '</div>'+
  (S.fortes.length>0?'<div class="card"><span class="card-label">pontos fortes destacados</span><div>'+fortesChips+'</div></div>':"")+
  (S.recado?'<div style="background:linear-gradient(135deg,#f7d8ff,#feeffd);border:1px solid rgba(234,178,255,.6);border-radius:14px;padding:18px 20px;margin-bottom:14px"><span class="card-label">recado pro sam 💌</span><p style="font-style:italic;color:#201923;font-size:13px;line-height:1.6;margin:0">&ldquo;'+esc(S.recado)+'&rdquo;</p></div>':"")+
  (S.expectativas.length>0?'<div class="card"><span class="card-label">o que poderia ter sido melhor</span><div>'+expChips+'</div></div>':"")+
  '<div style="display:none">'+esc(S.proto)+'</div>'+
  '<button class="btn-primary btn-full" onclick="resetForm()">enviar novo feedback ✨</button>'+
  '<div class="footer-note">feito com 💜 pelo radar · better csi · nubank</div>';
}

function resetForm(){
  S={step:0,nome:"",email:"",anonimo:false,dia:"",estrelas:0,disponibilidade:"",impressao:"",fortes:[],recado:"",nps:null,confianca:null,expectativas:[],textolivre:"",countResult:0,sending:false,proto:newProto()};
  render(true);
}

render(true);
</script>
</body>
</html>
